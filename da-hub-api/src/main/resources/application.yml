spring:
  application:
    name: da-hub-api

  datasource:
    url: jdbc:postgresql://localhost:5432/dahub
    username: postgres
    password: admin
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

logging:
  level:
    com.dahub: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.security: INFO
